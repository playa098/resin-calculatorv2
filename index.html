<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fibreglass Workshop Resin Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1e1e1e;
    color: white;
    margin: 0;
    padding: 0;
}
header {
    background: #ff6600;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}
.container { padding: 20px; }
input, select {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    font-size: 18px;
    border-radius: 6px;
    border: none;
}
button {
    width: 100%;
    padding: 18px;
    font-size: 20px;
    background: #ff6600;
    color: white;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
}
.result {
    margin-top: 20px;
    font-size: 20px;
    background: #2a2a2a;
    padding: 15px;
    border-radius: 8px;
}
.warning { color: orange; font-weight: bold; }
.danger { color: red; font-weight: bold; }
.flash { animation: flash 1s infinite; }
@keyframes flash {
    0% {opacity:1;}
    50% {opacity:0.2;}
    100% {opacity:1;}
}
canvas {
    margin-top: 20px;
    background: #111;
    border-radius: 8px;
    width: 100%;
}
</style>
</head>

<body>

<header>Fibreglass Workshop Resin Calculator</header>

<div class="container">

<select id="resinType">
    <option value="summer">Summer Resin (70 min)</option>
    <option value="infusion">Infusion Resin (35 min, 1.5% at 25°C)</option>
    <option value="winter">Winter Resin (25 min)</option>
</select>

<input type="number" step="0.01" id="resinWeight" placeholder="Resin Weight (kg)">
<input type="number" id="tempInput" placeholder="Temperature °C">
<input type="number" id="humidityInput" placeholder="Humidity %">
<input type="number" id="jobTime" placeholder="Desired Working Time (minutes)">

<button onclick="calculateResin()">Calculate</button>

<div class="result" id="resinResult"></div>

<canvas id="cureGraph" height="150"></canvas>

</div>

<script>

/* Auto-select default resin based on month (optional) */
window.onload = function() {
    const month = new Date().getMonth();
    const select = document.getElementById("resinType");
    if (month >= 9 || month <= 2) select.value = "summer";      // Oct–Mar
    else if (month >= 3 && month <= 5) select.value = "infusion"; // Apr–Jun
    else select.value = "winter";                                  // Jul–Sep
};

function calculateResin() {

    const resinKg = parseFloat(document.getElementById("resinWeight").value);
    const temp = parseFloat(document.getElementById("tempInput").value);
    const humidity = parseFloat(document.getElementById("humidityInput").value);
    const desiredTime = parseFloat(document.getElementById("jobTime").value);
    const type = document.getElementById("resinType").value;

    if (isNaN(resinKg) || isNaN(temp) || isNaN(humidity) || isNaN(desiredTime)) {
        document.getElementById("resinResult").innerHTML = "Fill in all fields.";
        return;
    }

    /* ---- Manufacturer GEL TIMES & BASE % ---- */
    let gelTime;
    let basePercent;

    if (type === "winter") {
        gelTime = 25;
        basePercent = 2;    // 2%
    } else if (type === "infusion") {
        gelTime = 35;
        basePercent = 1.5;  // 1.5% per new spec
    } else {
        gelTime = 70;
        basePercent = 2;    // Summer 2%
    }

    /* ---- Convert Gel → Working Time (70% margin) ---- */
    const workingMargin = 0.7;
    const baseWorkingTime = gelTime * workingMargin;

    /* ---- Temperature Adjustment ---- */
    const tempFactor = Math.pow(2, (temp - 25) / 10);
    const adjustedWorkingTime = baseWorkingTime / tempFactor;

    /* ---- Catalyst % Calculation ---- */
    let catalystPercent = (basePercent / 2) * (adjustedWorkingTime / desiredTime);
    /* The formula keeps proportion relative to base percent (e.g., infusion 1.5%) */

    /* Humidity Adjustment */
    if (humidity > 40) catalystPercent += (humidity - 40) * 0.00002;

    /* Clamp catalyst to 1–3% */
    let hitMax = false;
    if (catalystPercent > 0.03) {
        catalystPercent = 0.03;
        hitMax = true;
    }
    if (catalystPercent < 0.01) catalystPercent = 0.01;

    /* ---- Final Working Time Based on Actual Catalyst ---- */
    const finalWorkingTime = adjustedWorkingTime * ((basePercent/100) / catalystPercent);

    /* ---- Catalyst mL Calculation ---- */
    const resinGrams = resinKg * 1000;
    const catalystDensity = 1.1;
    const catalystML = (resinGrams * catalystPercent) / catalystDensity;

    /* ---- Build Output ---- */
    let html =
        `Resin: <b>${resinKg.toFixed(2)} kg</b><br>` +
        `Catalyst: <b>${(catalystPercent*100).toFixed(2)}%</b><br>` +
        `Catalyst Amount: <b>${catalystML.toFixed(1)} mL</b><br>` +
        `Estimated Working Time: ~${finalWorkingTime.toFixed(0)} mins<br>` +
        `<small>(Gel time converted to working time at 70%)</small><br>`;

    /* ---- Fast Kick Warning ---- */
    if (finalWorkingTime < 5) {
        html += "<div class='danger flash'>⚠ EXTREME FAST KICK RISK (Under 5 mins)</div>";
    }

    /* ---- Degas Logic ---- */
    if (hitMax && finalWorkingTime > desiredTime) {
        const degas = finalWorkingTime - desiredTime;
        if (degas > 10) html += `<div class='danger'>DEGAS REQUIRED: ~${degas.toFixed(0)} mins</div>`;
        else html += `<div class='warning'>Degas: ~${degas.toFixed(0)} mins</div>`;
    }

    /* ---- Smart Suggestion ---- */
    if (type === "summer" && desiredTime < 30) {
        html += "<div class='warning'>Suggestion: Switch to Winter Resin</div>";
    }

    document.getElementById("resinResult").innerHTML = html;

    /* ---- Draw Cure Curve ---- */
    drawGraph(finalWorkingTime);
}

/* ---- Simple Cure Curve Graph ---- */
function drawGraph(potLife) {
    const canvas = document.getElementById("cureGraph");
    canvas.width = canvas.offsetWidth;
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.beginPath();
    ctx.moveTo(0, canvas.height);

    for (let i = 0; i <= potLife; i++) {
        const x = (i / potLife) * canvas.width;
        const y = canvas.height - (Math.pow(i/potLife, 2) * canvas.height);
        ctx.lineTo(x, y);
    }

    ctx.strokeStyle = "#ff6600";
    ctx.lineWidth = 3;
    ctx.stroke();
}

</script>

</body>
</html>
